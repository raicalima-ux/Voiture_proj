{% extends 'base.html' %}

{% block conteudo %}


<div id="template_uso_empilhadeira">
    <!--título-->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="titulo-pagina">
                <i class="bi bi-tools"></i>
                Uso de empilhadeira
                <!--se passarem um id, o titulo vira outro-->
            </h2>
        </div>
        <div>
            <!--rota para ir visualizar as empilhadeiras já cadastradas-->
            <a href="{{ url_for('tabelaempilhadeira') }}" class="btn btn-success">
                <i></i>Visualizar Empilhadeiras</a>
        </div>
    </div>

    <form action="{{ url_for('salvar_uso_empilhadeira')}}" method="POST">
        <!--Div pai-->
        <div class="row">
            <!--coluna-->
            <div class="col-md-6 mb-3" style="width: 50%;">
                <!--nome do campo option -->
                <label for="funcionario_id" class="form-label">Funcionário</label>
                <div class="input-group" style="width: 100%;">
                    <span class="input-group-text bg-dark border-secondary">
                        <!--icone BS-->
                        <i class="bi bi-person-fill text-white"></i>
                    </span>

                    <!--campo option + importação do nome e id do funcionário existente-->
                    <select id="funcionario_id" name="funcionario_id" class="form-select">
                        <option value="">Selecione</option>
                        {% for funcionario in funcionarios %}
                        <option value="{{ funcionario.id }}">
                            nome {{ funcionario.funcionario_nome }} - {{ funcionario.id }}
                        </option>
                        {% endfor %}
                    </select>

                </div>

            </div>
            <!--coluna + noma do campo option-->
            <div class="col-md-6 mb-3 w-50">
                <label for="empilhadeira_id" class="form-label">Empilhadeira</label>
                <div class="input-group" style="width: 100%;">
                    <!--icone BS-->
                    <span class="input-group-text bg-dark border-secondary">
                        <i class="bi bi-tools text-white"></i>
                    </span>
                    <!--campo option + importação do chassi, marca, modelo e id de uma empilhadeira existente-->
                    <select id="empilhadeira_id" name="empilhadeira_id" class="form-select">
                        <option value="">Selecione</option>
                        {% for empilhadeira in empilhadeiras %}
                        <option value="{{ empilhadeira.id }}">
                            chassi {{ empilhadeira.empilhadeira_chassi }} - marca {{ empilhadeira.empilhadeira_marca }}
                            - modelo {{ empilhadeira.empilhadeira_modelo }} - {{ empilhadeira.id }}
                        </option>
                        {% endfor %}
                    </select>

                </div>

            </div>

            <!--Botao-->
            <div class=" botao-direita">
                <button type="submit" class="btn botao-add">Registrar</button>
            </div>


    </form>

</div>



{% endblock %}
